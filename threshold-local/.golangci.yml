run:
  timeout: 5m
  tests: true
  # Use skip-dirs-use-default instead of skip-dirs
  skip-dirs-use-default: true
  # Use exclude instead of skip-files
  exclude-files:
    - ".*_test.go"

linters:
  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - errcheck
    - exportloopref
    - exhaustive
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - revive
    - staticcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - whitespace

  disable:
    - funlen
    - gochecknoglobals
    - gocognit
    - godox
    - prealloc
    - gomnd  # Removed from enabled list

linters-settings:
  depguard:
    rules:
      main:
        deny:
          - pkg: "github.com/sirupsen/logrus"
            desc: "Use standard library log package"

  dupl:
    threshold: 100

  errcheck:
    check-type-assertions: true
    check-blank: true

  exhaustive:
    default-signifies-exhaustive: false

  goconst:
    min-len: 2
    min-occurrences: 2

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc

  gocyclo:
    min-complexity: 15

  goimports:
    local-prefixes: github.com/lux/threshold

  govet:
    enable-all: true
    # Removed check-shadowing as it's deprecated

  lll:
    line-length: 140

  misspell:
    locale: US

  nolintlint:
    # Removed allow-leading-space as it's deprecated
    allow-unused: false
    require-explanation: false
    require-specific: false

  revive:
    confidence: 0

  gosec:
    excludes:
      - G104  # Ignore error checking for some cases
      - G115  # Integer overflow (controlled conversions in cryptographic operations)
      - G304  # File path provided by user
      - G401  # Use of weak cryptographic primitive (specific crypto for threshold schemes)
      - G501  # Weak crypto (same reason)
      - G502  # Weak crypto (same reason)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gosec

    - path: pkg/math/
      text: "magic number"
      
    - path: pkg/zk/
      text: "magic number"

    - path: protocols/
      text: "magic number"

    - path: cmd/
      linters:
        - gochecknoinits

    - linters:
        - lll
      source: "^//go:generate "

  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true