---
# provision.yml — Launch EC2 instances across 5 US/CA regions for Signet testnet.
#
# Prerequisites:
#   - AWS CLI configured with appropriate credentials
#   - boto3 installed: pip install boto3
#   - An SSH key pair created in each region (or use --extra-vars to specify)
#
# Usage:
#   ansible-playbook provision.yml -e ssh_key_name=signet-testnet
#
# This playbook:
#   1. Creates a security group in each region (SSH + p2p + API)
#   2. Launches a t3.medium instance in each region
#   3. Writes the public IPs back into inventory.yml
#   4. Waits for SSH to become available

- name: Provision Signet testnet EC2 instances
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ssh_key_name: signet-testnet
    instance_type: t3.medium
    # Ubuntu 24.04 LTS AMIs per region (arm64 not available for t3, use x86_64)
    ami_map:
      us-east-1: ami-009d9173b44d0482b      # Ubuntu 24.04 LTS x86_64 (Canonical)
      us-east-2: ami-0be45a99d3b2708c6
      us-west-1: ami-0bb143ce53f4a1801
      us-west-2: ami-0650f6c65227d92b1
      ca-central-1: ami-0661a43f3872e791b
    security_group_name: signet-testnet-sg
    nodes:
      - { name: node1, region: us-east-1 }
      - { name: node2, region: us-east-2 }
      - { name: node3, region: us-west-1 }
      - { name: node4, region: us-west-2 }
      - { name: node5, region: ca-central-1 }

  tasks:
    - name: Ensure security group in each region
      amazon.aws.ec2_security_group:
        name: "{{ security_group_name }}"
        description: "Signet testnet - SSH, p2p, API"
        region: "{{ item.region }}"
        rules:
          - proto: tcp
            from_port: 22
            to_port: 22
            cidr_ip: 0.0.0.0/0
            rule_desc: SSH
          - proto: tcp
            from_port: 9000
            to_port: 9000
            cidr_ip: 0.0.0.0/0
            rule_desc: "libp2p"
          - proto: tcp
            from_port: 8080
            to_port: 8080
            cidr_ip: 0.0.0.0/0
            rule_desc: "HTTP API"
        state: present
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.region }}"
      register: sg_results
      ignore_errors: false

    - name: Ensure EC2 instance per node
      amazon.aws.ec2_instance:
        name: "signet-{{ item.name }}"
        region: "{{ item.region }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_map[item.region] }}"
        key_name: "{{ ssh_key_name }}"
        security_group: "{{ security_group_name }}"
        network:
          assign_public_ip: true
        volumes:
          - device_name: /dev/sda1
            ebs:
              volume_size: 20
              volume_type: gp3
        exact_count: 1
        state: running
        wait: true
        tags:
          Project: signet-testnet
          Node: "{{ item.name }}"
        filters:
          "tag:Project": signet-testnet
          "tag:Node": "{{ item.name }}"
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.name }} ({{ item.region }})"
      register: ec2_results

    - name: Build instance IP map
      set_fact:
        instance_ips: >-
          {{ instance_ips | default({}) | combine({
               item.item.name: (item.instances[0].public_ip_address
                                | default(item.instances[0].network_interfaces[0].association.public_ip
                                | default('UNKNOWN')))
             }) }}
      loop: "{{ ec2_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Display instance IPs
      debug:
        msg: "{{ item.key }}: {{ item.value }}"
      loop: "{{ instance_ips | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Write instance IPs to file for deploy script
      copy:
        content: |
          {% for node in nodes %}
          {{ node.name }}={{ instance_ips[node.name] }}
          {% endfor %}
        dest: "{{ playbook_dir }}/../.hosts"

    - name: Wait for SSH on all instances
      wait_for:
        host: "{{ item.value }}"
        port: 22
        timeout: 120
        state: started
      loop: "{{ instance_ips | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Update inventory with provisioned IPs
      debug:
        msg: >
          Instances launched. Update testnet/ansible/inventory.yml with:
          {% for node in nodes %}
            {{ node.name }}: {{ instance_ips[node.name] }}
          {% endfor %}
          Or source testnet/.hosts and run the deploy playbook.
