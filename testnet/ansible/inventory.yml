---
# Signet testnet inventory
# After provisioning, update the ansible_host values with the public IPs.
# Node private keys and peer IDs are generated by devnet-init and filled in
# by the deploy script.

all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: "{{ lookup('env', 'SIGNET_SSH_KEY') | default('~/.ssh/signet-testnet.pem', true) }}"
    ansible_python_interpreter: /usr/bin/python3

    # Sepolia RPC — set via environment or override here.
    eth_rpc: "{{ lookup('env', 'SEPOLIA_RPC_URL') }}"

    # Binary and data paths on remote hosts.
    signetd_bin: /usr/local/bin/signetd
    signetd_data_dir: /opt/signet/data
    signetd_config_dir: /opt/signet
    signetd_log_dir: /var/log/signet
    signetd_user: signet

    # Factory address — filled after contract deployment.
    factory_address: "{{ lookup('env', 'FACTORY_ADDRESS') | default('', true) }}"

    # libp2p ports
    p2p_port: 9000
    api_port: 8080

  children:
    signet_nodes:
      hosts:
        node1:
          ansible_host: 54.162.239.66
          aws_region: us-east-1
          node_index: 1
        node2:
          ansible_host: 98.92.138.72
          aws_region: us-east-1
          node_index: 2
        node3:
          ansible_host: 54.165.110.150
          aws_region: us-east-1
          node_index: 3
        node4:
          ansible_host: 54.196.139.112
          aws_region: us-east-1
          node_index: 4
        node5:
          ansible_host: 98.93.2.116
          aws_region: us-east-1
          node_index: 5
