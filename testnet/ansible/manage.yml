---
# manage.yml — Common management tasks for testnet nodes.
#
# Usage:
#   ansible-playbook manage.yml -e action=stop
#   ansible-playbook manage.yml -e action=start
#   ansible-playbook manage.yml -e action=restart
#   ansible-playbook manage.yml -e action=status
#   ansible-playbook manage.yml -e action=logs
#   ansible-playbook manage.yml -e action=logs-kms
#   ansible-playbook manage.yml -e action=clean

- name: "Manage signetd ({{ action | default('status') }})"
  hosts: signet_nodes
  become: true

  tasks:
    # ---- Stop ----
    - name: Stop signetd
      systemd:
        name: signetd
        state: stopped
      when: action == "stop"

    - name: Stop kms-tss
      systemd:
        name: kms-tss
        state: stopped
      when: action == "stop" and use_kms | default(false) | bool
      failed_when: false

    # ---- Start ----
    - name: Start kms-tss
      systemd:
        name: kms-tss
        state: started
      when: action == "start" and use_kms | default(false) | bool

    - name: Start signetd
      systemd:
        name: signetd
        state: started
      when: action == "start"

    # ---- Restart ----
    - name: Restart kms-tss
      systemd:
        name: kms-tss
        state: restarted
      when: action == "restart" and use_kms | default(false) | bool

    - name: Restart signetd
      systemd:
        name: signetd
        state: restarted
      when: action == "restart"

    # ---- Status ----
    - name: Check signetd status
      command: systemctl status signetd --no-pager
      register: status_out
      changed_when: false
      failed_when: false
      when: action | default("status") == "status"

    - name: Show signetd status
      debug:
        msg: "{{ status_out.stdout_lines }}"
      when: action | default("status") == "status" and status_out is defined

    - name: Check kms-tss status
      command: systemctl status kms-tss --no-pager
      register: kms_status_out
      changed_when: false
      failed_when: false
      when: action | default("status") == "status" and use_kms | default(false) | bool

    - name: Show kms-tss status
      debug:
        msg: "{{ kms_status_out.stdout_lines }}"
      when: action | default("status") == "status" and use_kms | default(false) | bool and kms_status_out is defined

    # ---- Logs ----
    - name: Fetch recent signetd logs
      command: journalctl -u signetd --no-pager -n {{ log_lines | default(50) }}
      register: log_out
      changed_when: false
      when: action == "logs"

    - name: Show signetd logs
      debug:
        msg: "{{ log_out.stdout_lines }}"
      when: action == "logs" and log_out is defined

    # ---- KMS Logs ----
    - name: Fetch recent kms-tss logs
      command: journalctl -u kms-tss --no-pager -n {{ log_lines | default(50) }}
      register: kms_log_out
      changed_when: false
      when: action == "logs-kms"

    - name: Show kms-tss logs
      debug:
        msg: "{{ kms_log_out.stdout_lines }}"
      when: action == "logs-kms" and kms_log_out is defined

    # ---- Clean ----
    - name: Stop signetd before clean
      systemd:
        name: signetd
        state: stopped
      when: action == "clean"
      failed_when: false

    - name: Stop kms-tss before clean
      systemd:
        name: kms-tss
        state: stopped
      when: action == "clean" and use_kms | default(false) | bool
      failed_when: false

    - name: Remove signetd data directory
      file:
        path: "{{ signetd_data_dir }}"
        state: absent
      when: action == "clean"

    - name: Recreate signetd data directory
      file:
        path: "{{ signetd_data_dir }}"
        state: directory
        owner: "{{ signetd_user }}"
        group: "{{ signetd_user }}"
        mode: "0755"
      when: action == "clean"

    - name: Remove KMS data directory
      file:
        path: "{{ kms_data_dir }}"
        state: absent
      when: action == "clean" and use_kms | default(false) | bool

    - name: Recreate KMS data directory
      file:
        path: "{{ kms_data_dir }}"
        state: directory
        owner: "{{ signetd_user }}"
        group: "{{ signetd_user }}"
        mode: "0700"
      when: action == "clean" and use_kms | default(false) | bool
