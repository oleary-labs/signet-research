---
# roles/bb/tasks/main.yml — Install Barretenberg (bb) prover/verifier.
#
# Reads the pinned bb version from signet-circuits/toolchain.json so there is
# exactly one source of truth. Installed under the ansible_user home, then
# symlinked to /usr/local/bin/bb so signetd can find it on PATH.

- name: Read bb version from signet-circuits toolchain.json
  set_fact:
    bb_version: "{{ lookup('file', playbook_dir + '/../../../signet-circuits/toolchain.json') | from_json | json_query('bb') }}"

- name: Install bbup
  become: false
  shell: |
    if [ ! -f "$HOME/.bb/bbup" ]; then
      curl -sL https://raw.githubusercontent.com/AztecProtocol/aztec-packages/refs/heads/next/barretenberg/bbup/install | bash
    fi
  args:
    creates: /home/ubuntu/.bb/bbup

- name: Install bb at pinned version ({{ bb_version }})
  become: false
  shell: |
    export PATH="$HOME/.bb:${PATH}"
    bbup -v {{ bb_version }}
  environment:
    PATH: "/home/ubuntu/.bb:{{ ansible_env.PATH }}"

- name: Check bb version
  become: false
  command: /home/ubuntu/.bb/bb --version
  register: bb_ver
  changed_when: false

- name: Show bb version
  debug:
    msg: "bb {{ bb_ver.stdout }}"

- name: Copy bb to /usr/local/bin
  copy:
    src: /home/ubuntu/.bb/bb
    dest: /usr/local/bin/bb
    mode: "0755"
    remote_src: true
