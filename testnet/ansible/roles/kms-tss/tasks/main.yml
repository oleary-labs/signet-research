---
# roles/kms-tss/tasks/main.yml — Deploy kms-tss alongside signetd.

- name: Create KMS data directory
  become: true
  file:
    path: "{{ kms_data_dir }}"
    state: directory
    owner: "{{ signetd_user }}"
    group: "{{ signetd_user }}"
    mode: "0700"

- name: Upload kms-tss binary
  become: true
  copy:
    src: "{{ local_kms_binary_path | default('../../../../build/kms-tss-linux-amd64') }}"
    dest: "{{ kms_bin }}"
    owner: root
    group: root
    mode: "0755"
  notify: restart kms-tss

- name: Install kms-tss systemd unit
  become: true
  template:
    src: kms-tss.service.j2
    dest: /etc/systemd/system/kms-tss.service
    mode: "0644"
  notify:
    - reload systemd
    - restart kms-tss

- name: Enable and start kms-tss
  become: true
  systemd:
    name: kms-tss
    enabled: true
    state: started
    daemon_reload: true
