---
# Group variables for all signet nodes.
# Per-node variables (peer_id, eth_address, etc.) are set in host_vars/
# after running devnet-init and the deploy script.

node_type: public
log_level: debug

# KMS configuration
use_kms: true
kms_bin: /usr/local/bin/kms-frost
kms_socket: /run/signet/kms.sock
kms_data_dir: /opt/signet/kms-data

# Barretenberg version — read from signet-circuits/toolchain.json at deploy time.
# See roles/bb/tasks/main.yml for how this is resolved.
